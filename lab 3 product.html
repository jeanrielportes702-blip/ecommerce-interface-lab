<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ShopEase - Products</title>
<style>
/* Basic reset and layout styles */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #fff;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Header with navigation moved to top, responsive */
header {
  background-color: #222;
  padding: 15px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
header h1 {
  margin: 0;
  color: white;
  font-size: 2em;
}
nav {
  margin-top: 10px;
}
nav ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0;
  margin: 0;
  gap: 10px;
}
nav ul li {
  margin: 0;
}
nav ul li a {
  text-decoration: none;
  color: #fff;
  font-weight: bold;
  padding: 8px 16px;
  border-radius: 4px;
  transition: background 0.3s, transform 0.3s;
}
nav ul li a:hover {
  background: #444;
  transform: scale(1.05);
}
/* Larger screens: horizontal navigation */
@media (min-width: 768px) {
  nav ul {
    flex-direction: row;
    gap: 20px;
  }
}

/* Main content area with product grid */
.content {
  display: flex;
  flex: 1;
  padding: 20px;
  flex-direction: column;
}
@media (min-width: 768px) {
  .content {
    flex-direction: row;
  }
}

/* Product grid layout */
.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
  width: 100%;
  margin-top: 20px;
  opacity: 0;
  animation: fadeIn 1s forwards;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Product card styles */
article {
  background: #fff;
  border-radius: 12px;
  border: 1px solid #ddd;
  padding: 15px;
  display: flex;
  flex-direction: column;
  align-items: center;
  box-shadow: 0 4px 8px rgba(0,0,0,0.05);
  transition: box-shadow 0.3s, transform 0.3s;
}
article:hover {
  box-shadow: 0 8px 16px rgba(0,0,0,0.15);
  transform: translateY(-4px);
}
article img {
  max-width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 8px;
}
article h3 {
  margin: 10px 0 5px 0;
  font-size: 1.2em;
}
article p {
  margin: 5px 0;
  font-weight: bold;
}
article a {
  margin-top: 12px;
  padding: 8px 16px;
  background-color: #007BFF;
  color: #fff;
  text-decoration: none;
  border-radius: 6px;
  font-weight: bold;
  transition: background 0.3s, transform 0.3s;
}
article a:hover {
  background-color: #0056b3;
  transform: scale(1.05);
}
/* Footer style at bottom */
footer {
  background-color: #222;
  color: #fff;
  text-align: center;
  padding: 15px;
}
</style>
</head>
<body>
<header>
<h1 style="margin:0; color:white;">ShopEase</h1>
<nav>
<ul>
<li><a href="landing.html">Home</a></li>
<li><a href="product.html">Shop</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>
</header>
<div class="content">
<div class="product-grid">
<article>
<img src="headphones.jpg" alt="Wireless Headphones" />
<h3>Wireless Headphones</h3>
<p>$79.99</p>
<a href="product-details.html">View Details</a>
</article>
<article>
<img src="watch.jpg" alt="Smart Watch" />
<h3>Smart Watch</h3>
<p>$129.99</p>
<a href="product-details.html">View Details</a>
</article>
<article>
<img src="shoes.jpg" alt="Running Shoes" />
<h3>Running Shoes</h3>
<p>$59.99</p>
<a href="product-details.html">View Details</a>
</article>
<article>
<img src="jacket.jpg" alt="Leather Jacket" />
<h3>Leather Jacket</h3>
<p>$89.99</p>
<a href="product-details.html">View Details</a>
</article>
</div>
</div>
<footer>
<p>&copy; 2026 ShopEase. All Rights Reserved.</p>
</footer>
</body>
</html>
